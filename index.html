<title>Goomba Lifts</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --s1: #ffffff;
  --s2: #f5f5f5;
  --s3: #eeeeee;
  --border: #e0e0e0;
  --text: #000000;
  --muted: #555555;
  --push: #e8440a;
  --pull: #000000;
  --legs: #000000;
  --core: #555555;
  --gold: #e8440a;
  --r: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100vh;overflow-x:hidden;}

/* NAV */
.topbar{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.logo{font-family:'Instrument Sans',sans-serif;font-size:26px;letter-spacing:1px;color:var(--text);}
.logo em{color:var(--push);font-style:normal;}
.topbar-date{font-size:12px;color:var(--muted);font-weight:500;}

.botbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:50;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 0 14px;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;transition:color .2s;}
.bni.active{color:var(--push);}
.bni-icon{font-size:19px;}

/* PAGES */
.page{display:none;padding:14px 16px 90px;}
.page.active{display:block;}

/* TYPOGRAPHY */
.sec-label{font-family:'Instrument Sans',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--push);margin:20px 0 10px;}

/* WEEK STRIP */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:4px;}
.wday{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:9px 3px;text-align:center;cursor:pointer;}
.wday.today{border-color:var(--push);border-width:2px;}
.wday-name{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.wday-dot{width:6px;height:6px;border-radius:50%;margin:5px auto 4px;background:var(--border);}
.wday-dot.push{background:var(--push);box-shadow:0 0 6px var(--push);}
.wday-dot.pull{background:var(--pull);box-shadow:none;}
.wday-dot.legs{background:var(--legs);box-shadow:none;}
.wday-dot.core{background:var(--core);box-shadow:none;}
.wday-type{font-size:8px;color:var(--muted);font-weight:500;}

/* TODAY HERO */
.hero{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:6px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.hero-tag{font-size:10px;font-weight:600;letter-spacing:0.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.hero-title{font-family:'Instrument Sans',sans-serif;font-weight:800;font-size:46px;letter-spacing:0.5px;line-height:1;margin-bottom:4px;}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.hero-stats{display:flex;gap:8px;margin-bottom:18px;}
.hstat{flex:1;background:var(--s2);border-radius:10px;padding:10px 8px;text-align:center;}
.hstat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;}
.hstat-lbl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;}

/* BUTTONS */
.btn{width:100%;padding:15px;border-radius:var(--r);border:none;font-family:'Instrument Sans',sans-serif;font-size:19px;letter-spacing:0.5px;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);opacity:.85;}
.btn-push{background:var(--push);color:#ffffff;}
.btn-pull{background:#000000;color:#ffffff;}
.btn-legs{background:#000000;color:#ffffff;}
.btn-core{background:#333333;color:#ffffff;}
.btn-ghost{background:var(--s3);color:var(--muted);}
.btn-sm{padding:8px 16px;font-size:14px;letter-spacing:1px;width:auto;font-family:'JetBrains Mono',monospace;font-weight:600;border-radius:8px;border:none;cursor:pointer;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;}
.overlay.open{display:block;}
.modal{background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:100px;}
.mhead{position:sticky;top:0;background:var(--s1);border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
.mhead-info{}
.mhead-sub{font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--muted);text-transform:uppercase;}
.mhead-title{font-family:'Instrument Sans',sans-serif;font-weight:800;font-size:28px;letter-spacing:0.5px;}
.close-x{background:var(--s2);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* EXERCISE CARDS */
.excard{margin:8px 14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.excard.done{border-color:#1a3a1a;}
.excard-head{display:flex;align-items:center;padding:13px 14px;gap:10px;cursor:pointer;user-select:none;}
.ex-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;}
.excard.done .ex-chk{background:var(--legs);border-color:var(--legs);color:#000;}
.ex-title{flex:1;font-size:14px;font-weight:500;}
.excard.done .ex-title{color:var(--muted);text-decoration:line-through;}
.ex-badge{font-size:11px;color:var(--muted);text-align:right;line-height:1.5;}

.exbody{display:none;border-top:1px solid var(--border);padding:14px;}
.exbody.open{display:block;}

/* SET ROWS */
.sets-header{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:8px;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding:0 2px;}
.set-row{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:7px;}
.set-num{font-size:11px;font-weight:600;color:var(--muted);text-align:center;background:var(--s3);border-radius:6px;padding:7px 4px;}
.set-inp{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 10px;outline:none;transition:border-color .2s;width:100%;-moz-appearance:textfield;}
.set-inp::-webkit-outer-spin-button,.set-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.set-inp:focus{border-color:var(--muted);}
.set-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;line-height:1;transition:color .2s;}
.set-del:hover{color:var(--push);}

.add-set-btn{background:none;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;padding:8px;width:100%;cursor:pointer;margin-top:4px;transition:all .2s;letter-spacing:.5px;}
.add-set-btn:hover{border-color:var(--muted);color:var(--text);}

.pr-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(232,68,10,.1);color:var(--gold);font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 8px;border-radius:20px;margin-bottom:10px;border:1px solid rgba(232,68,10,.3);}

.mark-done-btn{width:100%;margin-top:12px;padding:10px;border-radius:8px;border:none;background:var(--s3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.mark-done-btn:hover{background:rgba(0,230,118,.15);color:var(--legs);}
.mark-done-btn.undone:hover{background:rgba(255,82,82,.1);color:var(--push);}

/* FINISH BAR */
.finish-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;padding:10px 14px 14px;background:var(--bg);border-top:1px solid var(--border);z-index:300;}

/* HISTORY MODAL */
.hist-date-group{margin-bottom:16px;}
.hist-dg-label{font-family:'Instrument Sans',sans-serif;font-size:14px;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;}
.hist-entry{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.hist-entry-info{flex:1;}
.hist-entry-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.hist-entry-sets{font-size:11px;color:var(--muted);}
.hist-entry-actions{display:flex;gap:6px;}
.icon-btn{background:var(--s2);border:none;color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{color:var(--text);}
.icon-btn.del:hover{color:var(--push);background:rgba(255,82,82,.1);}

/* ADD PAST SESSION */
.past-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.past-form-title{font-weight:600;font-size:14px;margin-bottom:12px;}
.form-row{margin-bottom:10px;}
.form-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.form-select,.form-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:9px 12px;outline:none;}
.form-select option{background:var(--s2);}

/* PROGRESS PAGE */
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.cc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.cc-name{font-weight:600;font-size:14px;}
.cc-day{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.cc-pr{text-align:right;}
.cc-pr-lbl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.cc-pr-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--gold);}
.cc-pr-sub{font-size:10px;color:var(--muted);}
.chart-wrap{position:relative;height:100px;margin-bottom:4px;}
.chart-wrap svg{width:100%;height:100%;}
.chart-no-data{height:100px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;background:var(--s2);border-radius:8px;}
.chart-x{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px;}
.chart-y{position:absolute;left:-32px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;color:var(--muted);text-align:right;width:28px;}

/* OVERVIEW CHART */
.overview-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.ov-title{font-family:'Instrument Sans',sans-serif;font-size:16px;letter-spacing:0.5px;margin-bottom:14px;}
.ov-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.ov-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ov-leg-dot{width:10px;height:3px;border-radius:2px;}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:4px;}
.pills::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--muted);transition:all .2s;letter-spacing:.5px;}
.pill.active{color:var(--text);border-color:rgba(255,255,255,.3);background:var(--s2);}
.pill.push.active{border-color:var(--push);color:var(--push);background:rgba(255,82,82,.1);}
.pill.pull.active{border-color:var(--pull);color:var(--pull);background:rgba(68,138,255,.1);}
.pill.legs.active{border-color:var(--legs);color:var(--legs);background:rgba(0,230,118,.1);}
.pill.core.active{border-color:var(--core);color:var(--core);background:rgba(224,64,251,.1);}

/* TOAST */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DATE PICKER */
input[type=date]{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:9px 12px;outline:none;width:100%;-webkit-appearance:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}

/* EDIT MODAL */
.edit-set-row{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:7px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>

// UTILITIES

function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtShort(d){
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function toast(msg, ms=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

function maxKg(sets){ return Math.max(...sets.map(s=>parseFloat(s.kg)||0)); }

function updatePR(exId, sets){
  const best = maxKg(sets);
  if(best<=0) return false;
  if(!prs[exId]||best>prs[exId].kg){
    prs[exId]={kg:best,date:today()};
    return true;
  }
  return false;
}

}

function renderHome(){

  // Week strip
  const strip=document.getElementById('week-strip');
  strip.innerHTML='';
  const dnames=['S','M','T','W','T','F','S'];
  const tod=now.getDay();
  for(let i=0;i<7;i++){
    const s=SCHEDULE[i];
    const div=document.createElement('div');
    div.className='wday'+(i===tod?' today':'');
    div.innerHTML=`<div class="wday-name">${dnames[i]}</div>
      <div class="wday-dot ${s.type==='rest'?'':s.cls}"></div>
      <div class="wday-type">${s.type==='rest'?'–':s.type.toUpperCase()}</div>`;
    strip.appendChild(div);
  }

  // Hero
  const sched=SCHEDULE[tod];
  const hero=document.getElementById('today-hero');
  if(sched.type==='rest'){
    hero.innerHTML=`<div class="hero">
      <div class="hero-tag">TODAY</div>
      <div class="hero-title" style="color:var(--muted)">REST DAY</div>
      <div class="hero-sub">Recovery is part of the plan 💤</div>
    </div>`;
    return;
  }
  const w=WORKOUTS[sched.type];
  const lastDate=getLastDate(sched.type);
  const prCount=w.exercises.filter(ex=>prs[ex.id]).length;
  const sessCount=getSessionCount(sched.type);
  hero.innerHTML=`<div class="hero">
    <div class="hero-tag">TODAY</div>
    <div class="hero-title" style="color:${sched.color}">${sched.label}</div>
    <div class="hero-sub">${w.exercises.length} exercises · ${lastDate?'Last: '+lastDate:'First time!'}</div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-val" style="color:${sched.color}">${w.exercises.length}</div><div class="hstat-lbl">Exercises</div></div>
      <div class="hstat"><div class="hstat-val" style="color:${sched.color}">${prCount}</div><div class="hstat-lbl">PRs Set</div></div>
      <div class="hstat"><div class="hstat-val" style="color:${sched.color}">${sessCount}</div><div class="hstat-lbl">Sessions</div></div>
    </div>
    <button class="btn ${w.btnCls}" onclick="openWorkout('${sched.type}')">START WORKOUT →</button>
  </div>`;
}

function getLastDate(type){
  let latest=null;
  WORKOUTS[type].exercises.forEach(ex=>{
    const h=history[ex.id];
    if(h&&h.length>0){const d=h[h.length-1].date; if(!latest||d>latest)latest=d;}
  });
  return latest?fmtShort(latest):null;
}

function getSessionCount(type){
  const dates=new Set();
  WORKOUTS[type].exercises.forEach(ex=>{
    (history[ex.id]||[]).forEach(e=>dates.add(e.date));
  });
  return dates.size;
}

// WORKOUT SESSION
// ═══════════════════════════════════════════════════════════════════════════
function openWorkout(type){
  activeType=type;
  sessionState={};
  const w=WORKOUTS[type];
  document.getElementById('mhead-sub').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
  const mt=document.getElementById('mhead-title');
  mt.textContent=w.name+' DAY'; mt.style.color=w.color;
  const fb=document.getElementById('finish-btn');
  fb.className='btn '+w.btnCls; fb.textContent='FINISH WORKOUT';

  const container=document.getElementById('session-exercises');
  container.innerHTML='';
  w.exercises.forEach(ex=>{
    const lastSets=getLastSets(ex.id);
    const pr=prs[ex.id];
    sessionState[ex.id]={sets:lastSets.length?lastSets.map(s=>({...s})):[{kg:ex.defW||'',reps:''},{kg:ex.defW||'',reps:''}],done:false};

    const card=document.createElement('div');
    card.className='excard'; card.id='ecard-'+ex.id;
    card.innerHTML=`
      <div class="excard-head" onclick="toggleExCard('${ex.id}')">
        <div class="ex-chk" id="echk-${ex.id}"></div>
        <div class="ex-title">${ex.name}</div>
        <div class="ex-badge">${ex.sets}<br><span style="color:${w.color};font-weight:600;">${pr?pr.kg+' kg PR':'—'}</span></div>
      </div>
      <div class="exbody" id="ebody-${ex.id}">
        ${pr?`<div class="pr-badge">🏆 Current PR: ${pr.kg} kg · ${fmtShort(pr.date)}</div>`:''}
        <div class="sets-header"><span>SET</span><span>WEIGHT (kg)</span><span>REPS</span><span></span></div>
        <div id="setscontainer-${ex.id}"></div>
        <button class="add-set-btn" onclick="addSessionSet('${ex.id}')">+ Add Set</button>
        <button class="mark-done-btn" id="mdone-${ex.id}" onclick="markDone('${ex.id}')">✓ Mark as Done</button>
      </div>`;
    container.appendChild(card);
    renderSessionSets(ex.id);
  });

  document.getElementById('workout-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function getLastSets(exId){
  const h=history[exId];
  if(!h||h.length===0) return [];
  return h[h.length-1].sets.map(s=>({...s}));
}

function toggleExCard(id){
  const b=document.getElementById('ebody-'+id);
  b.classList.toggle('open');
}

function renderSessionSets(exId){
  const container=document.getElementById('setscontainer-'+exId);
  if(!container) return;
  container.innerHTML='';
  const sets=sessionState[exId].sets;
  sets.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='set-row';
    row.innerHTML=`
      <div class="set-num">SET ${i+1}</div>
      <input class="set-inp" type="number" step="0.5" placeholder="kg" value="${s.kg||''}" oninput="updateSet('${exId}',${i},'kg',this.value)"/>
      <input class="set-inp" type="number" step="1" placeholder="reps" value="${s.reps||''}" oninput="updateSet('${exId}',${i},'reps',this.value)"/>
      <button class="set-del" onclick="removeSessionSet('${exId}',${i})">✕</button>`;
    container.appendChild(row);
  });
}

function updateSet(exId,idx,field,val){
  sessionState[exId].sets[idx][field]=val;
}

function addSessionSet(exId){
  const last=sessionState[exId].sets.slice(-1)[0];
  sessionState[exId].sets.push({kg:last?last.kg:'',reps:''});
  renderSessionSets(exId);
}

function removeSessionSet(exId,idx){
  if(sessionState[exId].sets.length<=1) return;
  sessionState[exId].sets.splice(idx,1);
  renderSessionSets(exId);
}

function markDone(exId){
  const s=sessionState[exId];
  const card=document.getElementById('ecard-'+exId);
  const chk=document.getElementById('echk-'+exId);
  const btn=document.getElementById('mdone-'+exId);

  if(!s.done){
    // save
    const entry={date:today(), sets:s.sets.map(x=>({kg:parseFloat(x.kg)||0, reps:parseInt(x.reps)||0}))};
    if(!history[exId]) history[exId]=[];
    history[exId].push(entry);
    const newPR=updatePR(exId, entry.sets);
    save();

    s.done=true;
    card.classList.add('done');
    chk.textContent='✓';
    btn.textContent='✓ Done — tap to undo';
    btn.classList.add('undone');
    if(newPR) toast('🏆 New PR on '+ALL_EX[exId].name+'!');
    // close body
    document.getElementById('ebody-'+exId).classList.remove('open');
  } else {
    // undo
    history[exId].pop();
    // recalc PR
    rebuildPR(exId);
    save();
    s.done=false;
    card.classList.remove('done');
    chk.textContent='';
    btn.textContent='✓ Mark as Done';
    btn.classList.remove('undone');
  }
}

function rebuildPR(exId){
  const h=history[exId]||[];
  let best=0; let bestDate='';
  h.forEach(e=>{ const m=maxKg(e.sets); if(m>best){best=m;bestDate=e.date;} });
  if(best>0) prs[exId]={kg:best,date:bestDate};
  else delete prs[exId];
}

function closeWorkout(){
  document.getElementById('workout-overlay').classList.remove('open');
  document.body.style.overflow='';
  renderHome();
}

function finishWorkout(){
  const w=WORKOUTS[activeType];
  const doneCount=Object.values(sessionState).filter(s=>s.done).length;
  closeWorkout();
  toast(`✅ ${doneCount}/${w.exercises.length} exercises logged!`,3000);
}

function addPastSet(){

  renderPastSets();
}

function removePastSet(i){
  if(pastSets.length<=1) return;
  pastSets.splice(i,1);
  renderPastSets();
}

function savePastSession(){
  const date=document.getElementById('past-date').value;
  const exId=document.getElementById('past-exercise').value;
  if(!date){toast('⚠️ Pick a date first');return;}
  const sets=pastSets.map(s=>({kg:parseFloat(s.kg)||0,reps:parseInt(s.reps)||0}));
  if(!history[exId]) history[exId]=[];
  history[exId].push({date,sets});
  history[exId].sort((a,b)=>a.date.localeCompare(b.date));
  rebuildPR(exId);
  save();
  toast('✅ Entry saved!');
  pastSets=[{kg:'',reps:''}];
  renderPastSets();
  renderHistoryList();
}

function renderHistoryList(){
  const list=document.getElementById('history-list');
  list.innerHTML='';

  // Collect all entries grouped by date
  const byDate={};
  Object.entries(history).forEach(([exId, entries])=>{
    entries.forEach((entry,idx)=>{
      if(!byDate[entry.date]) byDate[entry.date]=[];
      byDate[entry.date].push({exId,idx,entry});
    });
  });

  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  if(dates.length===0){
    list.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:30px;">No sessions logged yet</div>';
    return;
  }

  dates.forEach(date=>{
    const group=document.createElement('div');
    group.className='hist-date-group';
    group.innerHTML=`<div class="hist-dg-label">${fmtDate(date)}</div>`;
    const type=EX_TO_TYPE[byDate[date][0].exId];
    const w=type?WORKOUTS[type]:null;

    byDate[date].forEach(({exId,idx,entry})=>{
      const ex=ALL_EX[exId];
      const t=EX_TO_TYPE[exId];
      const wt=WORKOUTS[t];
      const setsStr=entry.sets.map((s,i)=>`${i+1}: ${s.kg}kg×${s.reps}`).join('  ·  ');
      const row=document.createElement('div');
      row.className='hist-entry';
      row.innerHTML=`
        <div class="hist-entry-info">
          <div class="hist-entry-name">${ex.name} <span style="font-size:10px;color:${wt.color};font-weight:600;letter-spacing:1px;">${t.toUpperCase()}</span></div>
          <div class="hist-entry-sets">${setsStr}</div>
        </div>
        <div class="hist-entry-actions">
          <button class="icon-btn" onclick="openEdit('${exId}',${idx})" title="Edit">✏️</button>
          <button class="icon-btn del" onclick="confirmDelete('${exId}',${idx})" title="Delete">🗑</button>
        </div>`;
      group.appendChild(row);
    });
    list.appendChild(group);
  });
}

function addEditSet(){

  renderEditSets();
}

function removeEditSet(i){
  if(editSets.length<=1) return;
  editSets.splice(i,1);
  renderEditSets();
}

function saveEdit(){
  const {exId,idx}=editTarget;
  const date=document.getElementById('edit-date').value;
  history[exId][idx]={date,sets:editSets.map(s=>({kg:parseFloat(s.kg)||0,reps:parseInt(s.reps)||0}))};
  history[exId].sort((a,b)=>a.date.localeCompare(b.date));
  rebuildPR(exId);
  save();
  closeEdit();
  renderHistoryList();
  toast('✅ Entry updated!');
}

function deleteEntry(){
  const {exId,idx}=editTarget;
  history[exId].splice(idx,1);
  rebuildPR(exId);
  save();
  closeEdit();
  renderHistoryList();
  toast('🗑 Entry deleted');
}

function confirmDelete(exId,idx){
  editTarget={exId,idx};
  deleteEntry();
}

function closeEdit(){
  document.getElementById('edit-overlay').classList.remove('open');
  document.body.style.overflow='';
}

let progFilter='all';

function filterProg(type,el){
  progFilter=type;
  document.querySelectorAll('#prog-pills .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderProgress();
}

function renderProgress(){
  renderOverviewChart();
  renderExerciseCharts();
}

function getAllDates(){
  const dates=new Set();
  Object.values(history).forEach(entries=>entries.forEach(e=>dates.add(e.date)));
  return [...dates].sort();
}

function renderOverviewChart(){
  const svg=document.getElementById('ov-svg');
  svg.innerHTML='';
  const xEl=document.getElementById('ov-x');
  const yEl=document.getElementById('ov-y');
  xEl.innerHTML=''; yEl.innerHTML='';

  // Collect per-type best weight per date
  const typeColors={push:'var(--push)',pull:'var(--pull)',legs:'var(--legs)',core:'var(--core)'};
  const types=progFilter==='all'?['push','pull','legs','core']:[progFilter];

  // Build data: for each type, for each date, max weight across all exercises
  const typeData={};
  types.forEach(type=>{
    const exes=WORKOUTS[type].exercises;
    const byDate={};
    exes.forEach(ex=>{
      (history[ex.id]||[]).forEach(e=>{
        const m=maxKg(e.sets);
        if(m>0) byDate[e.date]=(byDate[e.date]||0)+m;
      });
    });
    if(Object.keys(byDate).length>0) typeData[type]=byDate;
  });

  if(Object.keys(typeData).length===0){
    svg.innerHTML='<text x="50%" y="50%" text-anchor="middle" fill="var(--muted)" font-size="12" font-family="JetBrains Mono">No data yet — start logging!</text>';
    return;
  }

  const allDates=[...new Set(Object.values(typeData).flatMap(d=>Object.keys(d)))].sort();
  if(allDates.length<1) return;

  const allVals=Object.values(typeData).flatMap(d=>Object.values(d));
  const minV=Math.min(...allVals)*0.9;
  const maxV=Math.max(...allVals)*1.05;
  const range=maxV-minV||1;

  const W=100, H=100; // percentage-based viewBox
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');

  // Grid lines
  for(let i=0;i<=4;i++){
    const y=i*(H/4);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0'); line.setAttribute('x2',W);
    line.setAttribute('y1',y); line.setAttribute('y2',y);
    line.setAttribute('stroke','var(--border)'); line.setAttribute('stroke-width','0.5');
    svg.appendChild(line);
  }

  Object.entries(typeData).forEach(([type,byDate])=>{
    const dates=Object.keys(byDate).sort();
    if(dates.length<1) return;
    const pts=dates.map((d,i)=>{
      const x=allDates.length>1?(allDates.indexOf(d)/(allDates.length-1))*W:W/2;
      const y=H-((byDate[d]-minV)/range)*H;
      return `${x},${y}`;
    }).join(' ');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points',pts);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke',typeColors[type]);
    poly.setAttribute('stroke-width','2');
    poly.setAttribute('stroke-linecap','round');
    poly.setAttribute('stroke-linejoin','round');
    svg.appendChild(poly);
    dates.forEach((d,i)=>{
      const x=allDates.length>1?(allDates.indexOf(d)/(allDates.length-1))*W:W/2;
      const y=H-((byDate[d]-minV)/range)*H;
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r','2');
      c.setAttribute('fill',typeColors[type]);
      svg.appendChild(c);
    });
  });

  // X labels
  const showDates=allDates.length<=6?allDates:[allDates[0],allDates[Math.floor(allDates.length/2)],allDates[allDates.length-1]];
  xEl.innerHTML=showDates.map(d=>`<span>${fmtShort(d)}</span>`).join('');

  // Y labels
  yEl.innerHTML=[maxV,Math.round((maxV+minV)/2),Math.round(minV)].map(v=>`<span>${Math.round(v)}</span>`).join('');

  // Legend
  const leg=document.getElementById('ov-legend');
  leg.innerHTML=Object.keys(typeData).map(type=>`
    <div class="ov-leg-item">
      <div class="ov-leg-dot" style="background:${typeColors[type]};box-shadow:0 0 4px ${typeColors[type]}"></div>
      ${type.charAt(0).toUpperCase()+type.slice(1)}
    </div>`).join('');
}

function renderExerciseCharts(){
  const list=document.getElementById('progress-list');
  list.innerHTML='';
  const types=progFilter==='all'?['push','pull','legs','core']:[progFilter];
  const typeColors={push:'var(--push)',pull:'var(--pull)',legs:'var(--legs)',core:'var(--core)'};

  types.forEach(type=>{
    WORKOUTS[type].exercises.forEach(ex=>{
      const h=history[ex.id]||[];
      const pr=prs[ex.id];
      const card=document.createElement('div');
      card.className='chart-card';
      const color=typeColors[type];

      let chartHtml='';
      if(h.length>=2){
        // build per-session best weight
        const pts=h.map(e=>({date:e.date, val:maxKg(e.sets)})).filter(p=>p.val>0);
        if(pts.length>=2){
          const vals=pts.map(p=>p.val);
          const minV=Math.min(...vals)*0.9;
          const maxV=Math.max(...vals)*1.05;
          const range=maxV-minV||1;
          const W=300,H=80;
          const svgPts=pts.map((p,i)=>{
            const x=(i/(pts.length-1))*W;
            const y=H-((p.val-minV)/range)*H;
            return {x,y,v:p.val,d:p.date};
          });
          const polyPts=svgPts.map(p=>`${p.x},${p.y}`).join(' ');
          const circles=svgPts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}"/>`).join('');
          const firstD=fmtShort(pts[0].date);
          const lastD=fmtShort(pts[pts.length-1].date);
          chartHtml=`
            <div class="chart-wrap" style="margin-left:36px;">
              <div class="chart-y">
                <span>${Math.round(maxV)}</span>
                <span>${Math.round((maxV+minV)/2)}</span>
                <span>${Math.round(minV)}</span>
              </div>
              <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="100%" style="overflow:visible;">
                <line x1="0" y1="0" x2="${W}" y2="0" stroke="var(--border)" stroke-width="0.8"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="var(--border)" stroke-width="0.8"/>
                <line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="var(--border)" stroke-width="0.8"/>
                <polyline points="${polyPts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                ${circles}
              </svg>
            </div>
            <div class="chart-x"><span>${firstD}</span><span>${lastD}</span></div>`;
        }
      } else {
        chartHtml=`<div class="chart-no-data">No data yet — start logging!</div>`;
      }

      card.innerHTML=`
        <div class="cc-head">
          <div>
            <div class="cc-name">${ex.name}</div>
            <div class="cc-day" style="color:${color}">${type}</div>
          </div>
          ${pr?`<div class="cc-pr">
            <div class="cc-pr-lbl">Best</div>
            <div class="cc-pr-val">${pr.kg}<span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted)"> kg</span></div>
            <div class="cc-pr-sub">${fmtShort(pr.date)}</div>
          </div>`:''}
        </div>
        ${chartHtml}
        <div style="font-size:11px;color:var(--muted);margin-top:8px;">${h.length} session${h.length!==1?'s':''} logged</div>`;
      list.appendChild(card);
    });
  });
async function installApp(){
  const prompt = window._installPrompt;
  if(!prompt) return;
  prompt.prompt();
  const { outcome } = await prompt.userChoice;
  document.getElementById('install-banner')?.remove();
  if(outcome === 'accepted') toast('🎉 LIFT installed!');
}

function renderExercises(){
  const container = document.getElementById('exercises-content');
  const typeColors = {push:'var(--push)',pull:'var(--pull)',legs:'var(--legs)',core:'var(--core)'};
  const typeLabels = {push:'PUSH DAY',pull:'PULL DAY',legs:'LEGS DAY',core:'CORE DAY'};
  const typeSubs = {push:'Chest · Shoulders · Triceps',pull:'Back · Biceps · Traps · Forearms',legs:'Quads · Hamstrings · Glutes · Calves',core:'Core · Lower Back · Stability'};

  container.innerHTML = Object.entries(WORKOUTS).map(([type, w]) => {
    const color = typeColors[type];
    const exerciseRows = w.exercises.map(ex => {
      const pr = prs[ex.id];
      const lastEntry = (history[ex.id]||[]).slice(-1)[0];
      const lastWeight = lastEntry ? lastEntry.sets[0]?.kg : null;
      return `<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;">${ex.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${ex.sets}${lastWeight?` · last: ${lastWeight} kg`:''}</div>
        </div>
        ${pr?`<div style="font-size:11px;color:${color};font-weight:600;text-align:right;">🏆 ${pr.kg} kg</div>`:''}
      </div>`;
    }).join('');

    return `<div style="margin-bottom:16px;">
      <div class="sec-label" style="color:${color};margin-top:16px;">${typeLabels[type]}</div>
      <div style="font-size:11px;color:var(--muted);margin:-8px 0 10px;letter-spacing:.5px;">${typeSubs[type]}</div>
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        ${exerciseRows}
      </div>
    </div>`;
  }).join('');
}
